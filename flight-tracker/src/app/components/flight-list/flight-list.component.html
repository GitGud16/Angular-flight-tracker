<h2>Flight List</h2>

<div class="form-group mb-3">
  <label for="regionSelect">Filter by Region:</label>
  <select id="regionSelect" class="form-control" [(ngModel)]="selectedRegion" (change)="onRegionChange()">
    <option *ngFor="let region of regions" [value]="region">{{region}}</option>
  </select>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Callsign</th>
                <th>Origin</th>
                <th>Altitude</th>
                <th>Speed</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let flight of filteredFlights">
                <td>{{ flight.callsign }}</td>
                <td title="{{ flight.origin }}">{{ flight.origin | slice:0:15 }}{{ flight.origin.length > 15 ? '...' : '' }}</td>
                <td>{{ flight.altitude | number:'1.0-0' }} m</td>
                <td>{{ flight.velocity | number:'1.0-0' }} m/s</td>
                <td>
                    <a [routerLink]="['/details', flight.id]" class="btn btn-primary btn-sm">Details</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
